services:
  db:
    ports:
      - "5432:5432"

  backend:
    environment:
      FLASK_ENV: development
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    command: flask run --host=0.0.0.0 --port=8080

  frontend:
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start