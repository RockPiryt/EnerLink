services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: enerlink-backend-dev
    restart: unless-stopped
    environment:
      FLASK_APP: wsgi:app
      FLASK_ENV: development
      DATABASE_URL: sqlite:////app/enerlink.db
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
    command: flask run --host=0.0.0.0 --port=8080

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: enerlink-frontend-dev
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start