services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: enerlink-backend
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      DATABASE_URL: sqlite:////data/enerlink.db
      SECRET_KEY: ${SECRET_KEY}
    volumes:
      - /opt/enerlink/data:/data
    expose:
      - "8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: enerlink-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"